<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Hedztech — web development, UI/UX design, SEO, and digital marketing. Professional, fast, conversion-focused digital products."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#080a10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Hedztech — Digital Products & Growth</title>
    <script>
      (function () {
        try {
          var o = localStorage.getItem('hedztech-theme-user-override')
          var t = localStorage.getItem('hedztech-theme')
          if (o === '1' && (t === 'light' || t === 'dark')) {
            document.documentElement.dataset.theme = t
          } else {
            document.documentElement.dataset.theme = 'dark'
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
