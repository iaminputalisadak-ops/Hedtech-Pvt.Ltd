name: Deploy to cPanel (FTPS/FTP)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

env:
  # Opt into Node 24 for JavaScript actions ahead of the deprecation timeline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Debug toolchain
        run: |
          set -eux
          node -p "process.version"
          npm -v
          npm --prefix frontend -v
          ls -la frontend/node_modules/.bin | head -n 40 || true
          npm --prefix frontend ls vite || true

      - name: Debug FTP DNS + port
        env:
          HEDZTECH_FTP_HOST: ${{ secrets.HEDZTECH_FTP_HOST }}
          HEDZTECH_FTP_PORT: ${{ secrets.HEDZTECH_FTP_PORT }}
        run: |
          set -eux
          echo "FTP host: ${HEDZTECH_FTP_HOST}"
          echo "FTP port: ${HEDZTECH_FTP_PORT:-21}"
          (command -v nslookup >/dev/null 2>&1 && nslookup "${HEDZTECH_FTP_HOST}") || true
          (command -v dig >/dev/null 2>&1 && dig +short "${HEDZTECH_FTP_HOST}") || true
          python3 - <<'PY'
          import os, socket
          host=os.environ.get("HEDZTECH_FTP_HOST","")
          port=int(os.environ.get("HEDZTECH_FTP_PORT") or "21")
          print("Resolving…")
          try:
            print(socket.getaddrinfo(host, port)[0][4][0])
          except Exception as e:
            print("DNS_FAIL:", e)
            raise SystemExit(2)
          print("Connecting…")
          s=socket.socket()
          s.settimeout(6)
          try:
            s.connect((host, port))
            print("PORT_OK")
          except Exception as e:
            print("PORT_FAIL:", e)
            raise SystemExit(3)
          finally:
            s.close()
          PY

      - name: Build + assemble cPanel bundle
        env:
          NODE_ENV: production
        run: npm run pack:cpanel

      - name: Deploy bundle to cPanel
        env:
          HEDZTECH_FTP_HOST: ${{ secrets.HEDZTECH_FTP_HOST }}
          HEDZTECH_FTP_PORT: ${{ secrets.HEDZTECH_FTP_PORT }}
          HEDZTECH_FTP_USER: ${{ secrets.HEDZTECH_FTP_USER }}
          HEDZTECH_FTP_PASS: ${{ secrets.HEDZTECH_FTP_PASS }}
          HEDZTECH_FTP_REMOTE: ${{ secrets.HEDZTECH_FTP_REMOTE }}
          HEDZTECH_FTP_SECURE: ${{ secrets.HEDZTECH_FTP_SECURE }}
          # Fails the job if https://hedztech.com/ still serves old HTML (wrong FTP remote or CDN cache).
          HEDZTECH_DEPLOY_VERIFY_URL: https://hedztech.com/
        run: node scripts/deploy-ftp.mjs

